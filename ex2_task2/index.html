<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas</title>
  </head>
  <body>
    <form
      id="rectangle-form"
      style="
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: flex-start;
      "
    >
      <div>
        <label for="x">X:</label>
        <input type="number" id="x" name="x" placeholder="X coordinate" />
      </div>

      <div>
        <label for="y">Y:</label>
        <input type="number" id="y" name="y" placeholder="Y coordinate" />
      </div>

      <div>
        <label for="width">Width:</label>
        <input type="number" id="width" name="width" placeholder="Width" />
      </div>

      <div>
        <label for="height">Height:</label>
        <input type="number" id="height" name="height" placeholder="Height" />
      </div>

      <div>
        <label for="color">Color:</label>
        <input type="color" id="color" name="color" />
      </div>

      <button type="submit" id="draw-btn">Draw Rectangle</button>
    </form>
    <canvas
      id="myCanvas"
      width="400"
      height="400"
      style="border: 1px solid #000000"
    ></canvas>

    <script src="script.js"></script>
  </body>
</html>
